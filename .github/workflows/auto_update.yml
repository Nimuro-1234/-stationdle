name: Daily Station Extraction

on:
  schedule:
    # 日本時間(JST)の深夜3時は、協定世界時(UTC)の前日18時です
    # 設定時刻より3～5時間遅れるので、更新時刻をJST22:07に設定（1次）
    - cron: '7 13 * * *'
    # 2次バックアップ（JST02:52）
    - cron: "52 15 * * *"
    # 3次バックアップ（JST 04:37）
    - cron: "37 19 * * *"
    # 4次バックアップ（JST 08:36）
    - cron: "36 23 * * *"
    # 5次バックアップ（JST 14:08）
    - cron: "08 05 * * *"
    # 6次バックアップ（JST 18:23）
    - cron: "23 09 * * *"
  # 手動でもボタンから実行できるようにする設定
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run extraction script
        run: python extract_stations.py

        # 【ここを追加】駅データが完成した直後に、そのデータを使って答えを生成する
      - name: Generate daily answer
        run: python generate_answer.py

      - name: 取得したデータをコミットしてプッシュする
        run: |
          # 誰が更新したかを記録するためのGitの初期設定です
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 変更（追加や修正）があったファイルを自動で安全にすべて選択します
          # これにより、特定のフォルダに差分がない日でもエラーにならなくなります
          git add -A
          
          # 画面裏で本当にファイルに変更（差分）があるかチェックします
          if [ -n "$(git status --porcelain)" ]; then
            echo "データの変更を検知したため、更新処理を行います。"
            git commit -m "Auto-update stations & generated answers"
            
            # 最新の状態を反映させてから安全にプッシュします
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git push origin main
          else
            echo "変更されたデータはありませんでした。処理を正常終了します。"
          fi

          # 【ここから追加】作成された最新データをdevelopmentにも同期する
      - name: Sync stations.json to development
        run: |
          git fetch origin development
          git checkout development
          
          # mainブランチにある最新のstations.jsonだけを引っ張ってくる
          git checkout main -- stations.json
          git checkout main -- ekidle/answer
          
          # developmentブランチへコミットしてプッシュする
          git commit -m "Sync stations.json from main" || echo "No changes to sync"
          git push origin development
