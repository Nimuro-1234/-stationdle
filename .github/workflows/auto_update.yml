name: Auto Update Stations
on:
schedule:
- cron: '0 18 * * 0'
workflow_dispatch:
jobs:
update:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.x'
- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install requestsBeautifulSoup4
- name: Run script
run: python extract_stations.py
- name: Commit and Push
run: |
git config --local user.email "action@github.com"
git config --local user.name "GitHub Action"
git add stations.json
git diff --cached --quiet || (git commit -m "Auto-update stations.json [skip ci]" && git push)
